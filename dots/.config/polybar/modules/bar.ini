[bar/mainbar]
monitor = ${env:MONITOR:}
width = 100%
height = 18pt
radius = 0

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

bottom = false

line-size = 6pt

#border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.primary}

; font-0 = "FiraCode Nerd Font:size=14;3"
; font-1 = "FiraCode Nerd Font:size=14;4"
; font-0 = JetBrainsMono Nerd Font:pixelsize=12;2
; font-1 = JetBrainsMono Nerd Font Mono:pixelsize=12;2

font-0 = JetBrainsMono Nerd Font:pixelsize=14;2
font-1 = JetBrainsMono Nerd Font Mono:pixelsize=14;2
; font-0 = Hack:pixelsize=9;3
; font-1 = Weather Icons:style=Regular:size=10;2
font-2 = "Wuncon Siji:pixelsize=10;3"
font-3 = FontAwesome5Free:style=Solid:pixelsize=10;3
font-4 = FontAwesome5Brands:style=Solid:pixelsize=10;3


; modules-left = i3-layout-single xworkspaces xwindow
modules-left = xworkspaces xwindow
; modules-right = mpris-text mpris-controls pulseaudio bluetooth battery systray date
modules-right = wifi currentaudiodevice pulseaudio systray date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
wm-restack = i3

; override-redirect = true


